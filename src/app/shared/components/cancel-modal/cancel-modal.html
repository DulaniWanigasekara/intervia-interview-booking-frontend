<div class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center
            justify-center z-50"
     (click)="close()">
  <div class="bg-white rounded-2xl w-100 max-w-[95vw] shadow-2xl p-7"
       (click)="$event.stopPropagation()">

    <h2 class="font-bold text-xl text-red-500 mb-2"
        style="font-family:'Syne',sans-serif;">Cancel Booking?</h2>
    <p class="text-gray-400 text-sm mb-5">
      This will release your slot. Others will be able to book it.
    </p>

    <div class="bg-red-50 border border-red-200 rounded-xl px-4 py-3
                text-sm text-red-600 mb-6 leading-relaxed">
      ⚠️ This cannot be undone. You will need to rebook if you change your mind.
    </div>

    @if (errorMessage) {
      <div class="bg-red-50 border border-red-300 text-red-700 rounded-lg
                  px-4 py-3 text-sm mb-4">
        {{ errorMessage }}
      </div>
    }

    <div class="flex gap-3">
      <button (click)="close()"
              class="flex-1 py-3 border-2 border-gray-200 rounded-xl text-sm
                     font-semibold text-gray-500 hover:bg-gray-50 transition-all">
        Keep It
      </button>
      <button (click)="confirm()"
              [disabled]="loading"
              class="flex-1 py-3 bg-red-500 hover:bg-red-600 text-white
                     rounded-xl text-sm font-semibold transition-all
                     disabled:opacity-50 disabled:cursor-not-allowed">
        {{ loading ? 'Cancelling...' : 'Yes, Cancel' }}
      </button>
    </div>

  </div>
</div>
